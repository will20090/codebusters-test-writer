<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Codebusters Test Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #f0f0f0; color: #222; min-height: 100vh; }

#topbar { background: #222; color: #eee; padding: 10px 24px; font-size: 16px; letter-spacing: 1px; font-weight: bold; }

#app { max-width: 900px; margin: 40px auto; padding: 0 20px; }

#profile-screen, #dashboard-screen { display: none; }
#profile-screen.active, #dashboard-screen.active { display: block; }

h2 { font-size: 15px; margin-bottom: 14px; font-weight: bold; }
h3 { font-size: 13px; margin-bottom: 10px; color: #555; }

/* Auth form */
#auth-form { display: flex; flex-direction: column; gap: 8px; max-width: 280px; margin-bottom: 16px; }
#auth-form input { font-family: monospace; font-size: 13px; border: 1px solid #ccc; padding: 5px 8px; }
#auth-form .btn-row { display: flex; gap: 8px; }
#auth-form button { background: #222; color: #fff; border: none; padding: 5px 14px; cursor: pointer; font-family: monospace; }
#auth-form button:hover { background: #444; }
#auth-form .secondary { background: #888; }
#auth-form .secondary:hover { background: #666; }
.err { color: red; font-size: 11px; margin-top: 4px; }

/* Dashboard */
#dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
#dash-header h2 { margin: 0; }
#dash-actions { display: flex; gap: 8px; align-items: center; }
#dash-actions button { background: #222; color: #fff; border: none; padding: 5px 14px; cursor: pointer; font-family: monospace; font-size: 13px; }
#dash-actions button:hover { background: #444; }
#dash-actions .secondary { background: #888; }
#dash-actions .secondary:hover { background: #666; }

/* Test list */
#test-list { display: flex; flex-direction: column; gap: 8px; }
.test-card {
  background: #fff; border: 1px solid #ddd; padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.test-card:hover { border-color: #999; }
.tc-name { font-weight: bold; font-size: 14px; flex: 1; cursor: pointer; }
.tc-name:hover { text-decoration: underline; }
.tc-meta { font-size: 11px; color: #888; }
.tc-actions { display: flex; gap: 6px; }
.tc-actions button { background: none; border: 1px solid #ccc; padding: 3px 10px; cursor: pointer; font-family: monospace; font-size: 11px; }
.tc-actions button:hover { background: #f0f0f0; }
.tc-actions .del-btn:hover { background: #fee; border-color: #c00; color: #c00; }

#empty-msg { color: #888; font-size: 13px; padding: 20px 0; }

/* Modal */
#modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
#modal-bg.open { display: flex; }
#modal { background: #fff; padding: 24px 28px; min-width: 320px; }
#modal h3 { margin-bottom: 14px; font-size: 14px; }
#modal input { font-family: monospace; font-size: 13px; border: 1px solid #ccc; padding: 6px 8px; width: 100%; margin-bottom: 8px; }
#modal-actions { display: flex; gap: 8px; margin-top: 4px; }
#modal-actions button { flex: 1; padding: 6px; cursor: pointer; font-family: monospace; font-size: 13px; border: 1px solid #ccc; }
#modal-ok { background: #222; color: #fff; border-color: #222; }
#modal-ok:hover { background: #444; }
</style>
</head>
<body>

<div id="topbar">CODEBUSTERS TEST BUILDER</div>

<div id="app">

  <!-- Auth screen (login / register) -->
  <div id="profile-screen">
    <br>
    <h2 id="auth-heading">Log In</h2>
    <div id="auth-form">
      <input id="auth-username" type="text" placeholder="Username" maxlength="40" autocomplete="username">
      <input id="auth-password" type="password" placeholder="Password" maxlength="80" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doAuth()">
      <div class="btn-row">
        <button id="auth-btn" onclick="doAuth()">Log In</button>
        <button class="secondary" onclick="toggleAuthMode()">Register instead</button>
      </div>
    </div>
    <div class="err" id="profile-err"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard-screen">
    <br>
    <div id="dash-header">
      <h2 id="dash-title">My Tests</h2>
      <div id="dash-actions">
        <button onclick="openNewTestModal()">+ New Test</button>
        <button class="secondary" onclick="doLogout()">← Log Out</button>
      </div>
    </div>
    <div id="test-list"></div>
    <div id="empty-msg" style="display:none">No tests yet. Click "New Test" to create one.</div>
  </div>

</div>

<!-- New test modal -->
<div id="modal-bg">
  <div id="modal">
    <h3>Name Your Test</h3>
    <input id="modal-input" type="text" placeholder="e.g. 2026 XXX Invitational B/C" maxlength="80"
           onkeydown="if(event.key==='Enter') confirmNewTest()">
    <div class="err" id="modal-err"></div>
    <div id="modal-actions">
      <button onclick="closeModal()">Cancel</button>
      <button id="modal-ok" onclick="confirmNewTest()">Create Test</button>
    </div>
  </div>
</div>

<script>
let authMode = 'login'; // 'login' | 'register'

// ── Init ──────────────────────────────────────────────────────────────────────

window.onload = async () => {
  try {
    const res = await fetch('/api/me');
    if (!res.ok) throw new Error('not ok');
    const data = await res.json();
    if (data.uid) {
      showDashboard(data.username);
      return;
    }
  } catch (e) {
    // server unreachable or returned error — fall through to login
  }
  showAuthScreen();
};

// ── Auth screen ───────────────────────────────────────────────────────────────

function showAuthScreen() {
  document.getElementById('profile-screen').classList.add('active');
  document.getElementById('dashboard-screen').classList.remove('active');
}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-heading').textContent = authMode === 'login' ? 'Log In' : 'Register';
  document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Log In' : 'Register';
  document.querySelector('#auth-form .secondary').textContent =
    authMode === 'login' ? 'Register instead' : 'Log in instead';
  document.getElementById('profile-err').textContent = '';
}

async function doAuth() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  document.getElementById('profile-err').textContent = '';
  if (!username || !password) {
    document.getElementById('profile-err').textContent = 'Enter username and password.';
    return;
  }
  const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
  const res = await fetch(endpoint, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username, password})
  });
  const data = await res.json();
  if (data.error) {
    document.getElementById('profile-err').textContent = data.error;
    return;
  }
  showDashboard(data.username);
}

async function doLogout() {
  await fetch('/api/logout', {method: 'POST'});
  document.getElementById('dashboard-screen').classList.remove('active');
  document.getElementById('auth-username').value = '';
  document.getElementById('auth-password').value = '';
  showAuthScreen();
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

async function showDashboard(username) {
  document.getElementById('profile-screen').classList.remove('active');
  document.getElementById('dashboard-screen').classList.add('active');
  document.getElementById('dash-title').textContent = (username || 'My') + "'s Tests";
  await loadTests();
}

async function loadTests() {
  const res = await fetch('/api/tests');
  if (!res.ok) { showAuthScreen(); return; }
  const tests = await res.json();
  const list = document.getElementById('test-list');
  const empty = document.getElementById('empty-msg');
  list.innerHTML = '';
  if (tests.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tests.forEach(t => {
    const mod = t.modified ? new Date(t.modified).toLocaleDateString() : '';
    const row = document.createElement('div');
    row.className = 'test-card';
    row.innerHTML = `
      <div class="tc-info" style="flex:1">
        <div class="tc-name" onclick="openTest('${t.id}')">${esc(t.name)}</div>
        <div class="tc-meta">${t.count} question${t.count!==1?'s':''} · last modified ${mod||'never'}</div>
      </div>
      <div class="tc-actions">
        <button onclick="openTest('${t.id}')">Open</button>
        <button onclick="renameTest('${t.id}','${esc(t.name)}')">Rename</button>
        <button class="del-btn" onclick="deleteTest('${t.id}','${esc(t.name)}')">Delete</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function openTest(tid) {
  sessionStorage.setItem('testId', tid);
  window.location.href = window.location.protocol + '//' + window.location.host + '/builder';
}

async function deleteTest(tid, name) {
  if (!confirm(`Delete test "${name}"? This cannot be undone.`)) return;
  await fetch('/api/tests/' + tid, {method: 'DELETE'});
  loadTests();
}

async function renameTest(tid, oldName) {
  const name = prompt('New name:', oldName);
  if (!name || name.trim() === oldName) return;
  await fetch('/api/tests/' + tid + '/rename', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name.trim()})
  });
  loadTests();
}

// ── New test modal ────────────────────────────────────────────────────────────

function openNewTestModal() {
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-err').textContent = '';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

async function confirmNewTest() {
  const name = document.getElementById('modal-input').value.trim();
  if (!name) { document.getElementById('modal-err').textContent = 'Enter a test name.'; return; }
  const res = await fetch('/api/tests', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  const t = await res.json();
  if (t.error) { document.getElementById('modal-err').textContent = t.error; return; }
  closeModal();
  openTest(t.id);
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
