<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enigma — Secret Test Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #f0f0f0; color: #222; min-height: 100vh; }

#topbar {
  background: #222; border-bottom: none;
  padding: 10px 24px; display: flex; align-items: center; gap: 16px;
}
#topbar h1 { font-size: 15px; letter-spacing: 2px; color: #eee; }
#topbar .back-btn {
  background: #444; color: #eee; border: 1px solid #666; padding: 4px 12px;
  cursor: pointer; font-family: monospace; font-size: 12px; text-decoration: none;
  display: inline-block;
}
#topbar .back-btn:hover { background: #555; }

#main { max-width: 1100px; margin: 40px auto; padding: 0 24px; }

#header-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
#header-row h2 { font-size: 14px; letter-spacing: 1px; color: #555; text-transform: uppercase; }

#add-btn {
  background: #222; color: #fff; border: none; padding: 6px 18px;
  cursor: pointer; font-family: monospace; font-size: 13px; font-weight: bold;
  letter-spacing: 1px;
}
#add-btn:hover { background: #333; }

/* Table */
#enigma-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
#enigma-table th {
  background: #e8e8e8; color: #555; font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; padding: 10px 12px; border-bottom: 1px solid #333;
  text-align: left;
}
#enigma-table td {
  padding: 10px 12px; border-bottom: 1px solid #ddd; vertical-align: middle;
}
#enigma-table tr:hover td { background: #f9f9f9; }

.test-name { font-weight: bold; color: #222; }
.date-cell { color: #888; font-size: 11px; }
.level-select {
  background: #fff; color: #222; border: 1px solid #ccc;
  padding: 3px 6px; font-family: monospace; font-size: 12px; cursor: pointer;
}
.level-select:focus { outline: none; border-color: #222; }
.open-btn {
  background: none; border: 1px solid #ccc; color: #222;
  padding: 4px 14px; cursor: pointer; font-family: monospace; font-size: 12px;
  text-decoration: none; display: inline-block;
}
.open-btn:hover { background: #e0e0e0; border-color: #333; }
.del-btn {
  background: none; border: 1px solid #ccc; color: #999;
  padding: 4px 10px; cursor: pointer; font-family: monospace; font-size: 11px;
  margin-left: 6px;
}
.del-btn:hover { border-color: #c00; color: #c00; }

#empty-msg { color: #555; font-size: 13px; padding: 40px 0; text-align: center; }

/* Modal — add entry */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff; border:none; padding: 28px 32px;
  min-width: 400px; max-width: 520px;
}
.modal h3 { font-size: 14px; color: #222; margin-bottom: 18px; letter-spacing: 1px; }
.modal label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: #888; margin-bottom: 12px; }
.modal select, .modal input {
  font-family: monospace; font-size: 13px; background: #fff;
  color: #222; border: 1px solid #ccc; padding: 6px 8px;
}
.modal select:focus, .modal input:focus { outline: none; border-color: #222; }
.modal-actions { display: flex; gap: 8px; margin-top: 6px; }
.modal-actions button {
  flex: 1; padding: 7px; cursor: pointer; font-family: monospace; font-size: 13px;
  border: 1px solid #333;
}
#modal-ok, #at-ok { background: #222; color: #fff; border-color: #222; }
#modal-ok:hover, #at-ok:hover { background: #444; }
#modal-cancel, #at-cancel { background: #f0f0f0; color: #555; border-color: #ccc; }
#modal-cancel:hover, #at-cancel:hover { background: #e0e0e0; }
.modal-err { color: #c00; font-size: 11px; min-height: 14px; margin-top: 4px; }

/* Error popup */
#err-popup {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center;
}
#err-popup.open { display: flex; }
#err-popup-box {
  background: #fff; border: 1px solid #c00; padding: 28px 32px;
  min-width: 320px; text-align: center;
}
#err-popup-box h3 { color: #c00; font-size: 14px; margin-bottom: 10px; }
#err-popup-box p { color: #aaa; font-size: 13px; margin-bottom: 18px; }
#err-popup-box button {
  background: #f0f0f0; color: #555; border: 1px solid #ccc;
  padding: 6px 20px; cursor: pointer; font-family: monospace;
}
#err-popup-box button:hover { background: #e0e0e0; }

/* Loading */
#loading { color: #555; font-size: 13px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>

<div id="topbar">
  <a href="/" class="back-btn">← Home</a>
    <h1 style="font-size:15px;letter-spacing:1px;">GROUP TEST TRACKER</h1>
</div>

<div id="main">
  <div id="header-row">
    <h2>Tests</h2>
    <button id="add-btn" onclick="openAddModal()">+ Add Row</button>
  </div>

  <div id="loading">Loading...</div>
  <div id="empty-msg" style="display:none">No tests yet. Click "+ Add Test" to add one.</div>

  <table id="enigma-table" style="display:none">
    <thead>
      <tr>
        <th style="width:35%">Test / Tournament Name</th>
        <th style="width:16%">Level</th>
        <th style="width:14%">Date Added</th>
        <th style="width:12%">Added By</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<!-- Add row modal -->
<div class="modal-bg" id="add-modal">
  <div class="modal">
    <h3>Add Row</h3>
    <label>Tournament Name
      <input id="m-tourney-name" type="text" placeholder="e.g. 2026 MIT Invitational" maxlength="120"
             onkeydown="if(event.key==='Enter') confirmAdd()">
    </label>
    <label>Level of Competition
      <select id="m-level">
        <option value="Invitational" selected>Invitational</option>
        <option value="Tryouts">Tryouts</option>
        <option value="Regionals">Regionals</option>
        <option value="States">States</option>
      </select>
    </label>
    <div class="modal-err" id="m-err"></div>
    <div class="modal-actions">
      <button id="modal-cancel" onclick="closeAddModal()">Cancel</button>
      <button id="modal-ok" onclick="confirmAdd()">Add Row</button>
    </div>
  </div>
</div>

<!-- Attach test modal -->
<div class="modal-bg" id="attach-modal">
  <div class="modal">
    <h3>Attach Test</h3>
    <label>Select one of your tests
      <select id="at-test-select">
        <option value="" disabled selected>Loading your tests...</option>
      </select>
    </label>
    <div class="modal-err" id="at-err"></div>
    <div class="modal-actions">
      <button id="at-cancel" onclick="closeAttachModal()">Cancel</button>
      <button id="at-ok" onclick="confirmAttach()">Attach</button>
    </div>
  </div>
</div>

<!-- Error popup (not shared) -->
<div id="err-popup">
  <div id="err-popup-box">
    <h3>Access Denied</h3>
    <p>Error: this test is not shared with you.</p>
    <button onclick="closeErrPopup()">Close</button>
  </div>
</div>

<script>
const ALLOWED = ['alan', 'will2009', 'lukechoiiiii', 'jullio'];

let myUid = null;
let myUsername = null;
let attachingEntryId = null;

async function init() {
  const res = await fetch('/api/me');
  const me = await res.json();
  if (!me.uid || !ALLOWED.includes((me.username || '').toLowerCase())) {
    window.location.href = '/';
    return;
  }
  myUid = me.uid;
  myUsername = me.username;
  await loadTable();
}

// ── Table ─────────────────────────────────────────────────────────────────────

async function loadTable() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('enigma-table').style.display = 'none';
  document.getElementById('empty-msg').style.display = 'none';

  const res = await fetch('/api/enigma/entries');
  const entries = await res.json();

  document.getElementById('loading').style.display = 'none';

  if (!entries.length) {
    document.getElementById('empty-msg').style.display = 'block';
    return;
  }

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  entries.forEach(e => {
    const tr = document.createElement('tr');
    let linkCell;
    if (e.test_id) {
      linkCell = `<a class="open-btn" href="#" onclick="openTest(event, '${e.id}', '${e.test_id}')">Open →</a>`;
      if (e.added_by === myUsername) {
        linkCell += ` <button class="open-btn" style="font-size:11px;" onclick="openAttachModal('${e.id}')">Change</button>`;
      }
    } else {
      if (e.added_by === myUsername) {
        linkCell = `<button class="open-btn" onclick="openAttachModal('${e.id}')">Attach Test</button>`;
      } else {
        linkCell = `<span style="color:#aaa;font-size:11px;">No test attached</span>`;
      }
    }
    tr.innerHTML = `
      <td class="test-name">${esc(e.tourney_name)}</td>
      <td>
        <select class="level-select" onchange="updateLevel('${e.id}', this.value)">
          ${['Invitational','Tryouts','Regionals','States'].map(l =>
            `<option value="${l}" ${e.level === l ? 'selected' : ''}>${l}</option>`
          ).join('')}
        </select>
      </td>
      <td class="date-cell">${formatDate(e.created)}</td>
      <td class="date-cell">${esc(e.added_by)}</td>
      <td>${linkCell}</td>
    `;
    if (e.added_by === myUsername) {
      const delTd = document.createElement('td');
      delTd.innerHTML = `<button class="del-btn" onclick="deleteEntry('${e.id}')">✕</button>`;
      tr.appendChild(delTd);
    } else {
      tr.appendChild(document.createElement('td'));
    }
    tbody.appendChild(tr);
  });

  document.getElementById('enigma-table').style.display = 'table';
}

async function openTest(evt, entryId, testId) {
  evt.preventDefault();
  const res = await fetch('/api/enigma/check_access/' + testId);
  const data = await res.json();
  if (!data.ok) {
    document.getElementById('err-popup').classList.add('open');
    return;
  }
  sessionStorage.setItem('testId', testId);
  sessionStorage.removeItem('practiceTestId');
  window.location.href = '/builder';
}

function closeErrPopup() {
  document.getElementById('err-popup').classList.remove('open');
}

async function updateLevel(entryId, level) {
  await fetch('/api/enigma/entries/' + entryId, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ level })
  });
}

async function deleteEntry(entryId) {
  if (!confirm('Remove this row from the tracker?')) return;
  await fetch('/api/enigma/entries/' + entryId, { method: 'DELETE' });
  await loadTable();
}

// ── Add Row modal ─────────────────────────────────────────────────────────────

function openAddModal() {
  document.getElementById('m-err').textContent = '';
  document.getElementById('m-tourney-name').value = '';
  document.getElementById('m-level').value = 'Invitational';
  document.getElementById('add-modal').classList.add('open');
  setTimeout(() => document.getElementById('m-tourney-name').focus(), 50);
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

async function confirmAdd() {
  const tourneyName = document.getElementById('m-tourney-name').value.trim();
  const level = document.getElementById('m-level').value;
  if (!tourneyName) { document.getElementById('m-err').textContent = 'Enter a tournament name.'; return; }

  const res = await fetch('/api/enigma/entries', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ tourney_name: tourneyName, level })
  });
  const data = await res.json();
  if (data.error) { document.getElementById('m-err').textContent = data.error; return; }
  closeAddModal();
  await loadTable();
}

// ── Attach Test modal ─────────────────────────────────────────────────────────

async function openAttachModal(entryId) {
  attachingEntryId = entryId;
  document.getElementById('at-err').textContent = '';

  const res = await fetch('/api/tests');
  const tests = await res.json();
  const sel = document.getElementById('at-test-select');
  sel.innerHTML = '';
  const mine = tests.filter(t => t.owned && !t.is_practice);
  if (!mine.length) {
    sel.innerHTML = '<option value="" disabled selected>No tests found — create one first</option>';
  } else {
    const blank = document.createElement('option');
    blank.value = ''; blank.disabled = true; blank.selected = true;
    blank.textContent = 'Select a test...';
    sel.appendChild(blank);
    mine.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  }
  document.getElementById('attach-modal').classList.add('open');
}

function closeAttachModal() {
  document.getElementById('attach-modal').classList.remove('open');
  attachingEntryId = null;
}

async function confirmAttach() {
  const testId = document.getElementById('at-test-select').value;
  if (!testId) { document.getElementById('at-err').textContent = 'Select a test.'; return; }

  const res = await fetch('/api/enigma/entries/' + attachingEntryId, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ test_id: testId })
  });
  const data = await res.json();
  if (data.error) { document.getElementById('at-err').textContent = data.error; return; }
  closeAttachModal();
  await loadTable();
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('add-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('add-modal')) closeAddModal();
  });
  document.getElementById('attach-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('attach-modal')) closeAttachModal();
  });
  document.getElementById('err-popup').addEventListener('click', e => {
    if (e.target === document.getElementById('err-popup')) closeErrPopup();
  });
});

init();
</script>
</body>
</html>
